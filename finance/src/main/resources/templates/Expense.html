<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Expense</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff416c,#ff4b2b);
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#ff4b2b;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
        }

        input,select,textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
        }

        textarea{
            height:80px;
            resize:none;
        }

        .btn{
            width:100%;
            padding:14px;
            background:#ff4b2b;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        .btn:hover{
            background:#e63c1f;
        }

        .success{
            text-align:center;
            color:green;
            margin-bottom:15px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>💸 Add Expense</h2>

    <p class="success" th:text="${msg}"></p>

    <form action="/expense/add" method="post">
        
        <div class="form-group">
            <label>Amount</label>
            <input type="number"
                   step="0.01"
                   name="amount"
                   required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description"></textarea>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date"
                   name="date"
                   required>
        </div>

        <input type="submit"
               value="Add Expense"
               class="btn">

    </form>

</div>

</body>
</html>
