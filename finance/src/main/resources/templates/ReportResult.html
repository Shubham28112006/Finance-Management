<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Finance Report</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{

            background:#edf2f7;

            padding:40px;

        }

        .container{

            width:95%;

            margin:auto;

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0px 10px 25px rgba(0,0,0,.15);

        }

        h1{

            text-align:center;

            color:#0f172a;

            margin-bottom:20px;

        }

        .month{

            text-align:center;

            font-size:18px;

            margin-bottom:30px;

        }

        .cards{

            display:flex;

            justify-content:space-between;

            margin-bottom:40px;

            gap:20px;

        }

        .card{

            flex:1;

            padding:25px;

            border-radius:12px;

            color:white;

            text-align:center;

            transition:.4s;

        }

        .card:hover{

            transform:translateY(-5px);

        }

        .income{

            background:#16a34a;

        }

        .expense{

            background:#dc2626;

        }

        .balance{

            background:#2563eb;

        }

        .buttons{

            display:flex;

            justify-content:center;

            gap:20px;

            margin-bottom:30px;

        }

        button{

            padding:14px 25px;

            border:none;

            border-radius:8px;

            font-size:16px;

            cursor:pointer;

            font-weight:bold;

            transition:.4s;

            color:white;

        }

        button:hover{

            transform:scale(1.05);

        }

        .pdf{

            background:#ef4444;

        }

        .excel{

            background:#22c55e;

        }

        .print{

            background:#2563eb;

        }

        table{

            width:100%;

            border-collapse:collapse;

            margin-top:15px;

            margin-bottom:35px;

        }

        table th{

            background:#1e293b;

            color:white;

            padding:15px;

        }

        table td{

            padding:12px;

            border:1px solid #ddd;

            text-align:center;

        }

        table tr:nth-child(even){

            background:#f5f5f5;

        }

        table tr:hover{

            background:#e2e8f0;

        }

        @media(max-width:900px){

            .cards{

                flex-direction:column;

            }

            .buttons{

                flex-direction:column;

            }

        }
    </style>

    <script>
        function printReport(){
            window.print();
        }
    </script>

</head>

<body>

<div class="container">

    <h1>Finance Report</h1>

    <div class="month">

        <b>From :</b>
        <span th:text="${startMonth}"></span>

        &nbsp;&nbsp;&nbsp;

        <b>To :</b>
        <span th:text="${endMonth}"></span>

    </div>

    <div class="cards">

        <div class="card income">
            <h2>Total Income</h2>
            <h1>₹ <span th:text="${totalIncome}"></span></h1>
        </div>

        <div class="card expense">
            <h2>Total Expense</h2>
            <h1>₹ <span th:text="${totalExpense}"></span></h1>
        </div>

        <div class="card balance">
            <h2>Balance</h2>
            <h1>₹ <span th:text="${balance}"></span></h1>
        </div>

    </div>

    <div class="buttons">

        <a href="/report/pdf">
            <button class="pdf">
                Download PDF
            </button>
        </a>

    </div>

    <h2>Income Report</h2>

    <table>

        <tr>

            <th>Source</th>
            <th>Amount</th>
            <th>Date</th>

        </tr>

        <tr th:each="i:${incomeList}">

            <td th:text="${i.source}"></td>

            <td th:text="${i.amount}"></td>

            <td th:text="${i.date}"></td>

        </tr>

    </table>

    <br>

    <h2>Expense Report</h2>

    <table>

        <tr>

            <th>Description</th>
            <th>Amount</th>
            <th>Date</th>

        </tr>

        <tr th:each="e:${expenseList}">

            <td th:text="${e.description}"></td>

            <td th:text="${e.amount}"></td>

            <td th:text="${e.date}"></td>

        </tr>

    </table>

</div>

</body>
</html>
