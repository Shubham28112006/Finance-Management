<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Income</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            background:linear-gradient(135deg,#1e3c72,#2a5298);

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;
        }

        .container{

            width:100%;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .card{

            background:#fff;

            width:450px;

            padding:35px;

            border-radius:15px;

            box-shadow:0 15px 35px rgba(0,0,0,.25);

            animation:fadeIn .5s ease;
        }

        @keyframes fadeIn{

            from{

                opacity:0;

                transform:translateY(30px);

            }

            to{

                opacity:1;

                transform:translateY(0);

            }

        }

        .card h2{

            text-align:center;

            margin-bottom:30px;

            color:#1e3c72;
        }

        .input-group{

            margin-bottom:20px;
        }

        .input-group label{

            display:block;

            margin-bottom:8px;

            font-weight:600;

            color:#444;
        }

        .input-group input{

            width:100%;

            padding:12px;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:15px;

            transition:.3s;
        }

        .input-group input:focus{

            border-color:#2a5298;

            outline:none;

            box-shadow:0 0 8px rgba(42,82,152,.3);
        }

        .buttons{

            display:flex;

            justify-content:space-between;

            margin-top:25px;
        }

        .update-btn{

            width:48%;

            background:#28a745;

            color:white;

            border:none;

            padding:12px;

            border-radius:8px;

            cursor:pointer;

            font-size:16px;

            font-weight:bold;

            transition:.3s;
        }

        .update-btn:hover{

            background:#218838;

            transform:translateY(-2px);
        }

        .cancel-btn{

            width:48%;

            text-align:center;

            text-decoration:none;

            background:#dc3545;

            color:white;

            padding:12px;

            border-radius:8px;

            font-weight:bold;

            transition:.3s;
        }

        .cancel-btn:hover{

            background:#c82333;

            transform:translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <h2>Update Income Record</h2>

        <form action="/income/updatedetails" method="post">

            <div th:each="u : ${ulist}">

                <input type="hidden" name="tid" th:value="${u.id}">

                <div class="input-group">
                    <label>Source</label>
                    <input type="text"
                           step="0.01"
                           name="tso"
                           th:value="${u.source}"
                           required>
                </div>

                <div class="input-group">
                    <label>Amount</label>
                    <input type="number"
                           name="tam"
                           th:value="${u.amount}"
                           required>
                </div>

                <div class="input-group">
                    <label>Date</label>
                    <input type="date"
                           name="tda"
                           th:value="${u.date}"
                           required>
                </div>

            </div>

            <div class="buttons">
                <input type="submit" value="Update Record" class="update-btn">

                <a href="/finance/show?sub=ShowIncome" class="cancel-btn">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
