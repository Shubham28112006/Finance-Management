<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Show Income Records</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fc;
            padding:40px;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:auto;
        }

        h1{
            text-align:center;
            color:#2c3e50;
            margin-bottom:30px;
            font-size:35px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#fff;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
            border-radius:10px;
            overflow:hidden;
        }

        thead{
            background:#3498db;
            color:white;
        }

        thead th{
            padding:15px;
            font-size:18px;
        }

        tbody td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
            font-size:16px;
        }

        tbody tr:nth-child(even){
            background:#3498db;
        }

        tbody tr:hover{
            background:#eaf4ff;
            transition:0.3s;
        }

        .total-row{
            background:#2ecc71;
            color:white;
            font-size:20px;
            font-weight:bold;
        }

        .total-row td{
            padding:25px;
        }

        .summary{
            width:350px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
            text-align:center;
        }

        .summary h2{
            color:#2c3e50;
            margin-bottom:10px;
        }

        .amount{
            color:#27ae60;
            font-size:32px;
            font-weight:bold;
        }

        .back-btn{
            display:block;
            width:180px;
            margin:30px auto;
            text-align:center;
            text-decoration:none;
            background:#3498db;
            color:white;
            padding:12px;
            border-radius:8px;
            font-size:18px;
            transition:.3s;
        }

        .back-btn:hover{
            background:#2980b9;
        }
        .action-btns{
            display:flex;
            justify-content:center;
            gap:10px;
        }

        .update-btn,
        .delete-btn{
            border:none;
            color:white;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
            font-weight:bold;
            transition:.3s;
        }

        .update-btn{
            background:#2563eb;
        }

        .update-btn:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        .delete-btn{
            background:#dc2626;
        }

        .delete-btn:hover{
            background:#b91c1c;
            transform:translateY(-2px);
        }
    </style>

</head>
<body>

<div class="container">

    <h1>💰 Income Records</h1>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Source</th>
            <th>Amount (₹)</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="u : ${ulist}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.source}"></td>
            <td th:text="${u.amount}"></td>
            <td th:text="${u.date}"></td>
            <td>

                <form class="action-btns" action="/income/updateincome">

                    <input type="hidden"
                           name="id"
                           th:value="${u.id}"/>
                    <button class="update-btn"
                            type="submit"
                            name="sub"
                            value="Update">
                        ✏ Update
                    </button>

                    <button class="delete-btn"
                            type="submit"
                            name="sub"
                            value="Delete">
                        🗑 Delete
                    </button>
                </form>
            </td>
        </tr>

        <tr class="total-row">
            <td colspan="2" style="text-align:right;">TOTAL INCOME</td>
            <td th:text="${totalIncome}"></td>
            <td></td>
        </tr>

        </tbody>

    </table>
    <a href="/templates/UserDashboard.html" class="back-btn">⬅ Back to Dashboard</a>

</div>

</body>
</html>
