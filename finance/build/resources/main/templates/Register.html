<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Customer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e40af);
        }

        .container{
            width:450px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.3);
        }

        .logo{
            text-align:center;
            font-size:30px;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            color:#1e40af;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#333;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#1e40af;
            outline:none;
            box-shadow:0 0 5px rgba(30,64,175,0.4);
        }

        .btn-group{
            display:flex;
            gap:10px;
            margin-top:20px;
        }

        .btn{
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .register-btn{
            background:#1e40af;
            color:white;
        }

        .register-btn:hover{
            background:#1e3a8a;
        }

        .cancel-btn{
            background:#dc2626;
            color:white;
        }

        .cancel-btn:hover{
            background:#b91c1c;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#666;
            font-size:13px;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="logo">🏦</div>

    <h2>Customer Registration</h2>

    <form name="f1" action="/finance/add">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text"
                   name="tname"
                   placeholder="Enter Full Name"
                   required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email"
                   name="tmail"
                   placeholder="Enter Email"
                   required>
        </div>

        <div class="input-group">
            <label>Mobile Number</label>
            <input type="text"
                   name="tphone"
                   placeholder="Enter Mobile Number"
                   required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password"
                   name="tpass"
                   placeholder="Enter Password"
                   required>
        </div>

        <div class="btn-group">

            <input type="submit"
                   value="Register"
                   class="btn register-btn">

            <input type="reset"
                   value="Cancel"
                   class="btn cancel-btn">

        </div>

    </form>

    <div class="footer">
        Secure Banking Registration Portal
    </div>

</div>

</body>
</html>
