<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
        }

        .container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.3);
        }

        .logo{
            text-align:center;
            font-size:28px;
            font-weight:bold;
            color:#0f172a;
            margin-bottom:25px;
        }

        .title{
            text-align:center;
            font-size:22px;
            margin-bottom:25px;
            color:#1e3a8a;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#333;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#1e3a8a;
            box-shadow:0 0 5px rgba(30,58,138,0.4);
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            margin-top:10px;
            transition:0.3s;
        }

        .login-btn{
            background:#1e3a8a;
            color:white;
        }

        .login-btn:hover{
            background:#142a63;
        }

        .register-btn{
            background:#16a34a;
            color:white;
        }

        .register-btn:hover{
            background:#15803d;
        }

        .admin-btn{
            background:#dc2626;
            color:white;
        }

        .admin-btn:hover{
            background:#b91c1c;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="logo">
        🏦 Finance System
    </div>

    <div class="title">
        Login Portal
    </div>

    <form name="f1" action="/finance/checking">

        <div class="input-group">
            <label>Email</label>
            <input type="email"
                   name="tmail"
                   placeholder="Enter Email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password"
                   name="tpass"
                   placeholder="Enter Password">
        </div>

        <input type="submit"
               name="sub"
               value="Login"
               class="btn login-btn">

        <input type="submit"
               name="sub"
               value="Register"
               class="btn register-btn">

        <input type="submit"
               name="sub"
               value="Admin"
               class="btn admin-btn">

    </form>

</div>

</body>
</html>
